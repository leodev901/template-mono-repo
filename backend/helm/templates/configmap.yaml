apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  APP_NAME: "{{ .Values.env.app.name }}"
  APP_ENV: "{{ .Values.env.app.env }}"
  APP_LOG_LEVEL: "{{ .Values.env.app.logLevel }}"
  APP_HOST: "{{ .Values.env.app.host }}"
  APP_PORT: "{{ .Values.env.app.port }}"
  
  # Gunicorn 구동 설정 매핑 (인프라 레이어 service 참조)
  GUNICORN_WORKERS: "{{ .Values.service.worker }}"
  GUNICORN_TIMEOUT: "{{ .Values.service.workerTimeout }}"

  # LangSmith & HF 비민감 설정 매핑
  LANGCHAIN_TRACING_V2: "{{ .Values.env.langsmith.enabled }}"
  LANGCHAIN_ENDPOINT: "{{ .Values.env.langsmith.endpoint }}"
  LANGCHAIN_PROJECT: "{{ .Values.env.langsmith.project }}"
  HF_ENDPOINT: "{{ .Values.env.huggingface.url }}"
